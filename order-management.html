    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; top:0; left:0; right:0; bottom:0;

    #root { position:relative; z-index:1; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .fade-in { animation:fadeIn .4s ease-out; }
    .slide-up { animation:slideUp .5s ease-out; }

    input, select, textarea {
      font-family:'DM Sans',sans-serif; background:var(--bg); border:1px solid var(--border);
      color:var(--text); padding:10px 14px; border-radius:var(--radius); font-size:14px;
      width:100%; transition:border-color .2s; outline:none;
    }
    input:focus, select:focus, textarea:focus { border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(59,130,246,.1); }
    input::placeholder { color:var(--text-muted); }
    select { cursor:pointer; }
    select option { background:var(--bg-card); }
    label { display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
    textarea { resize:vertical; min-height:60px; }

    .btn { padding:12px 24px; border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-weight:600; font-size:14px; border:none; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-primary { background:var(--accent-blue); color:white; }
    .btn-primary:hover:not(:disabled) { background:#2563eb; transform:translateY(-1px); box-shadow:0 4px 16px rgba(59,130,246,.3); }
    .btn-green { background:var(--accent-green); color:white; }
    .btn-green:hover:not(:disabled) { background:#16a34a; transform:translateY(-1px); }
    .btn-red { background:var(--accent-red); color:white; }
    .btn-red:hover:not(:disabled) { background:#dc2626; transform:translateY(-1px); }
    .btn-orange { background:var(--accent-orange); color:#1a1a1a; }
    .btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--bg-card-hover); color:var(--text); border-color:var(--text-muted); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-icon { padding:8px; border-radius:8px; background:transparent; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; transition:all .2s; font-size:16px; display:flex; align-items:center; justify-content:center; width:36px; height:36px; }

    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .badge-green { background:rgba(34,197,94,.15); color:#4ade80; }

    .badge-blue { background:rgba(59,130,246,.15); color:#60a5fa; }

    .toast { position:fixed; top:24px; right:24px; padding:14px 20px; border-radius:var(--radius); font-size:14px; font-weight:500; z-index:1000; animation:fadeIn .3s ease-out; max-width:400px; box-shadow:var(--shadow); }

    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:500; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s ease-out; }
    .modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; max-width:620px; width:90%; max-height:85vh; overflow-y:auto; animation:slideUp .3s ease-out; }

    .spinner { width:20px; height:20px; border:2px solid rgba(255,255,255,.2); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; }

    .pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid var(--border); transition:all .2s; background:transparent; }
    .pin-dot.filled { background:var(--accent-blue); border-color:var(--accent-blue); box-shadow:0 0 12px rgba(59,130,246,.4); }
    .pin-dot.error { background:var(--accent-red); border-color:var(--accent-red); }
    .pin-key { width:72px; height:72px; border-radius:50%; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:24px; font-family:'JetBrains Mono',monospace; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; user-select:none; }
    .pin-key:hover { background:var(--bg-card-hover); border-color:var(--text-muted); }
    .pin-key:active { transform:scale(.92); background:var(--accent-blue); border-color:var(--accent-blue); }

    .tbl { width:100%; border-collapse:collapse; }
    .tbl th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim); padding:10px 12px; border-bottom:1px solid var(--border); font-weight:600; }
    .tbl td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
    .tbl tr:hover td { background:var(--bg-card-hover); }

    .vat-result { padding:12px 16px; border-radius:var(--radius); margin-top:8px; font-size:13px; }
    .vat-valid { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#4ade80; }
    .vat-invalid { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#f87171; }

    .step-indicator { display:flex; gap:4px; align-items:center; }
    .step-dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:all .3s; }
    .step-dot.active { background:var(--accent-blue); width:24px; border-radius:4px; }
    .step-dot.done { background:var(--accent-green); }

    .tab-bar { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; }
    .tab-btn { padding:10px 20px; font-size:13px; font-weight:600; color:var(--text-dim); background:transparent; border:none; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; font-family:'DM Sans',sans-serif; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }

    .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
    .filter-bar input, .filter-bar select { width:auto; min-width:140px; padding:8px 12px; font-size:13px; }
    .stat-card { padding:20px; border-radius:var(--radius-lg); text-align:center; border:1px solid var(--border); }
    .stat-card .value { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
    .stat-card .label { font-size:12px; color:var(--text-dim); margin-top:4px; text-transform:uppercase; }
  </style>
</head>

    // ==================== VIES VAT ====================
    const VIES_URL = 'https://ec.europa.eu/taxation_customs/vies/rest-api/check-vat-number';
    async function verifyVAT(fullVat) {
      const match = fullVat.match(/^([A-Z]{2})(.+)$/);
      if (!match) throw new Error('Format NIP: XX123456789 (prefix kraju + numer)');
      const [, cc, num] = match;
      const body = JSON.stringify({ countryCode: cc, vatNumber: num });
      const hdrs = {'Content-Type':'application/json'};
      const proxies = [
        `${SUPABASE_URL}/functions/v1/vies-proxy`,
        `https://corsproxy.io/?${encodeURIComponent(VIES_URL)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(VIES_URL)}`
      ];

        try {
          const opts = { method:'POST', headers: url.includes('supabase') ? {...hdrs, 'Authorization':`Bearer ${SUPABASE_KEY}`} : hdrs, body };
          const r = await fetch(url, opts);
          if (r.ok) { const d = await r.json(); if (d.valid !== undefined) return d; }
        } catch {}
      }
      throw new Error('Nie udalo sie polaczyc z VIES. Sprobuj ponownie.');

              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span className="badge badge-blue" style={{fontFamily:'JetBrains Mono',fontSize:11}}>{stats.companies} firm</span>
                <span className="badge badge-orange" style={{fontFamily:'JetBrains Mono',fontSize:11}}>{stats.orders} zlecen</span>
                <button className={`btn-icon ${pendingNotifications > 0 ? '' : ''}`} onClick={()=>setPage('notifications')} style={{position:'relative',fontSize:16}} title="Powiadomienia">
                  {'\u{1F514}'}
                  {pendingNotifications > 0 && (
                    <span style={{position:'absolute',top:-4,right:-4,background:'var(--accent-red)',color:'#fff',borderRadius:'50%',width:18,height:18,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{pendingNotifications}</span>
                  )}
                </button>
                {currentUserData && (
                  <span style={{fontSize:12,color:'var(--accent-blue)',fontWeight:600,padding:'4px 12px',background:'rgba(59,130,246,.08)',borderRadius:20}}>
                    {currentUserData.name}
                  </span>
                )}
                <button className="btn btn-ghost" style={{padding:'6px 14px',fontSize:12}} onClick={onLogout}>Logout</button>
              </div>
            </div>
          </header>

          <div style={{maxWidth:1200,margin:'0 auto',padding:'16px 24px 0'}}>
            <div className="tab-bar">
              {[
                {id:'orders',label:'Zlecenia'},
                {id:'cashflow',label:'Cash Flow'},
                {id:'companies',label:'Firmy'},
                {id:'documents',label:'Dokumenty',badge:newDocsCount},
                {id:'tasks',label:'Zadania',badge:newTasksCount},
                {id:'notifications',label:'Powiadomienia',badge:pendingNotifications}
              ].map(t => (
                <button key={t.id} className={`tab-btn ${page===t.id?'active':''}`} onClick={()=>setPage(t.id)}>
                  {t.label}
                  {t.badge > 0 && <span style={{marginLeft:6,background: t.id==='tasks' ? 'var(--accent-orange)' : t.id==='documents' ? 'var(--accent-cyan)' : 'var(--accent-red)',color:'#fff',borderRadius:8,padding:'1px 6px',fontSize:10}}>{t.badge}</span>}
                </button>
              ))}
            </div>
          </div>

          <main style={{maxWidth:1200,margin:'0 auto',padding:'0 24px 80px'}}>
            {page === 'companies' && <CompanyManager addToast={addToast} onStatsChange={refreshStats}/>}
            {page === 'orders' && <OrdersModule addToast={addToast} onStatsChange={refreshStats} currentUser={currentUser}/>}
            {page === 'cashflow' && <CashFlowModule addToast={addToast}/>}
            {page === 'documents' && <DocumentsPanel addToast={addToast} onRefresh={refreshStats}/>}
            {page === 'tasks' && <TasksPanel addToast={addToast} onRefresh={refreshStats} currentUser={currentUser}/>}
            {page === 'notifications' && <NotificationsPanel addToast={addToast} onRefresh={refreshStats}/>}
          </main>
        </div>
      );
    }

    // ==================== COMPANY MANAGER ====================
    function CompanyManager({ addToast, onStatsChange }) {
      const [companies, setCompanies] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [showForm, setShowForm] = useState(false);
      const [editingCompany, setEditingCompany] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);

      const fetchCompanies = useCallback(async () => {
        setLoading(true);
        const { data, error } = await sb.from('companies').select('*').order('created_at', { ascending: false });
        if (error) addToast('Blad ladowania firm: ' + error.message, 'error');
        else setCompanies(data || []);
        setLoading(false);
      }, []);

      useEffect(() => { fetchCompanies(); }, []);

      const filtered = useMemo(() => {
        return companies.filter(c => {
          const q = search.toLowerCase();
          const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.vat_number||'').toLowerCase().includes(q) || (c.city||'').toLowerCase().includes(q);
          const matchType = filterType === 'all' || c.company_type === filterType;
          return matchSearch && matchType;
        });
      }, [companies, search, filterType]);

      const handleDelete = async () => {
        if (!deleteTarget) return;
        const { error } = await sb.from('companies').delete().eq('id', deleteTarget.id);
        if (error) addToast('Blad usuwania: ' + error.message, 'error');
        else { addToast('Firma "'+deleteTarget.name+'" usunieta', 'success'); fetchCompanies(); onStatsChange(); }
        setDeleteTarget(null);
      };

      const handleEdit = (c) => { setEditingCompany(c); setShowForm(true); };
      const handleFormClose = () => { setShowForm(false); setEditingCompany(null); };
      const handleFormSave = () => { handleFormClose(); fetchCompanies(); onStatsChange(); };

      const typeLabel = t => ({client:'Zleceniodawca',carrier:'Transportowiec',both:'Oba'}[t] || t);
      const typeBadge = t => ({client:'badge-blue',carrier:'badge-orange',both:'badge-purple'}[t] || 'badge-gray');

      return (
        <div className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
            <h2 style={{fontSize:22,fontWeight:700,flex:1}}>Zarzadzanie Firmami</h2>
            <button className="btn btn-green" onClick={()=>{setEditingCompany(null);setShowForm(true)}}>+ Dodaj firme</button>
          </div>

          <div className="filter-bar">
            <input placeholder="Szukaj firmy..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200}}/>
            <select value={filterType} onChange={e=>setFilterType(e.target.value)}>
              <option value="all">Wszystkie typy</option>
              <option value="client">Zleceniodawcy</option>
              <option value="carrier">Transportowcy</option>
              <option value="both">Oba</option>
            </select>
          </div>

          <div className="card" style={{padding:0,overflow:'hidden'}}>
            {loading ? (
              <div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Ladowanie...</div>
            ) : filtered.length === 0 ? (
              <div style={{padding:60,textAlign:'center'}}>
                <p style={{color:'var(--text-dim)'}}>Brak firm</p>
                <button className="btn btn-primary" onClick={()=>setShowForm(true)} style={{marginTop:12}}>+ Dodaj firme</button>
              </div>
            ) : (
              <div style={{overflowX:'auto'}}>
                <table className="tbl">
                  <thead><tr>
                    <th>Firma</th><th>NIP</th><th>Miasto</th><th>Typ</th><th>Kontakt</th><th>Akcje</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(c => (
                      <tr key={c.id}>
                        <td style={{fontWeight:600}}>{c.name}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{c.vat_number}</td>
                        <td>{c.city} {c.country}</td>
                        <td><span className={`badge ${typeBadge(c.company_type)}`}>{typeLabel(c.company_type)}</span></td>
                        <td style={{fontSize:12}}>{c.phone || c.email || '---'}</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn-icon" title="Edytuj" onClick={()=>handleEdit(c)}>E</button>
                            <button className="btn-icon" title="Usun" onClick={()=>setDeleteTarget(c)} style={{color:'var(--accent-red)'}}>X</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {deleteTarget && (
            <div className="modal-overlay" onClick={()=>setDeleteTarget(null)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <h3 style={{marginBottom:16}}>Usunac firme?</h3>
                <p style={{color:'var(--text-dim)',marginBottom:20}}>"{deleteTarget.name}" zostanie trwale usunieta.</p>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-ghost" onClick={()=>setDeleteTarget(null)} style={{flex:1,justifyContent:'center'}}>Anuluj</button>
                  <button className="btn btn-red" onClick={handleDelete} style={{flex:1,justifyContent:'center'}}>Usun</button>
                </div>
              </div>
            </div>
          )}

          {showForm && <CompanyForm company={editingCompany} addToast={addToast} onClose={handleFormClose} onSave={handleFormSave}/>}
        </div>
      );
    }

    // ==================== COMPANY FORM ====================
    function CompanyForm({ company, addToast, onClose, onSave }) {
      const isEdit = !!company;
      const [form, setForm] = useState(company || {
        vat_number:'',name:'',address:'',city:'',postal_code:'',country:'',
        phone:'',email:'',contact_person:'',contact_phone:'',contact_email:'',
        company_type:'carrier',bank_name:'',bank_account:'',payment_terms_days:30,notes:''
      });
      const [vatChecking, setVatChecking] = useState(false);
      const [vatResult, setVatResult] = useState(null);
      const [saving, setSaving] = useState(false);
      const [subTab, setSubTab] = useState('info');
      const showFleet = isEdit && (form.company_type === 'carrier' || form.company_type === 'both');

      const u = (k,v) => setForm(p => ({...p,[k]:v}));

      const checkVAT = async () => {
        if (!form.vat_number || form.vat_number.length < 4) { addToast('Podaj NIP','error'); return; }
        setVatChecking(true); setVatResult(null);
        try {
          const data = await verifyVAT(form.vat_number.toUpperCase().replace(/\s/g,''));
          setVatResult(data);
          if (data.valid) {
            u('name', data.name || form.name);
            if (data.address) {
              const parts = data.address.split('\n');
              u('address', parts[0] || '');
              if (parts[1]) {
                const m = parts[1].match(/(\d[\d\s-]*)\s+(.+)/);
                if (m) { u('postal_code', m[1].trim()); u('city', m[2].trim()); }
                else u('city', parts[1].trim());
              }
            }
            u('country', form.vat_number.substring(0,2).toUpperCase());
            addToast('NIP zweryfikowany - dane uzupelnione!', 'success');
          } else { addToast('NIP nieprawidlowy wg VIES', 'error'); }
        } catch (err) { addToast(err.message, 'error'); }
        setVatChecking(false);
      };

      const handleSave = async () => {
        if (!form.name) { addToast('Podaj nazwe firmy', 'error'); return; }
        setSaving(true);
        const payload = {...form, vat_verified: vatResult?.valid || form.vat_verified || false, updated_at: new Date().toISOString()};
        delete payload.id; delete payload.created_at;
        let error;
        if (isEdit) { ({error} = await sb.from('companies').update(payload).eq('id', company.id)); }
        else { ({error} = await sb.from('companies').insert(payload)); }
        if (error) addToast('Blad zapisu: ' + error.message, 'error');
        else { addToast(isEdit ? 'Firma zaktualizowana' : 'Firma dodana!', 'success'); onSave(); }
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:750,maxHeight:'90vh',overflowY:'auto'}}>
            <h3 style={{marginBottom:12}}>{isEdit ? 'Edytuj firme' : 'Dodaj nowa firme'}</h3>
            {showFleet && (
              <div style={{display:'flex',gap:4,marginBottom:16,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
                {[{id:'info',label:'Dane firmy'},{id:'vehicles',label:'Pojazdy'},{id:'drivers',label:'Kierowcy'}].map(t => (
                  <button key={t.id} className={`btn ${subTab===t.id?'btn-primary':'btn-ghost'}`}
                    style={{fontSize:12,padding:'5px 14px'}} onClick={()=>setSubTab(t.id)}>{t.label}</button>
                ))}
              </div>
            )}
            {(subTab === 'info' || !showFleet) && (<>

            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,marginBottom:16}}>
              <div>
                <label>NIP (z prefiksem kraju)</label>
                <input value={form.vat_number} onChange={e=>u('vat_number',e.target.value.toUpperCase())} placeholder="np. CZ05714907"/>
              </div>
              <div style={{alignSelf:'end'}}>
                <button className="btn btn-primary" onClick={checkVAT} disabled={vatChecking} style={{height:42}}>
                  {vatChecking ? <div className="spinner" style={{width:14,height:14}}/> : 'Weryfikuj'}
                </button>
              </div>
            </div>

            {vatResult && (
              <div className={`vat-result ${vatResult.valid?'vat-valid':'vat-invalid'}`}>
                {vatResult.valid ? 'NIP aktywny: '+vatResult.name : 'NIP nieaktywny lub nieprawidlowy'}
              </div>
            )}

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginTop:16}}>
              <div style={{gridColumn:'1/-1'}}>
                <label>Nazwa firmy</label>
                <input value={form.name} onChange={e=>u('name',e.target.value)} placeholder="Nazwa firmy"/>
              </div>
              <div>
                <label>Typ firmy</label>
                <select value={form.company_type} onChange={e=>u('company_type',e.target.value)}>
                  <option value="client">Zleceniodawca</option>
                  <option value="carrier">Transportowiec</option>
                  <option value="both">Oba</option>
                </select>
              </div>
              <div>
                <label>Kraj</label>
                <input value={form.country} onChange={e=>u('country',e.target.value)} placeholder="np. CZ" maxLength={2}/>
              </div>
              <div style={{gridColumn:'1/-1'}}>
                <label>Adres</label>
                <input value={form.address} onChange={e=>u('address',e.target.value)} placeholder="np. ul. Przykladowa 1"/>
              </div>
              <div>
                <label>Miasto</label>
                <input value={form.city} onChange={e=>u('city',e.target.value)}/>
              </div>
              <div>
                <label>Kod pocztowy</label>
                <input value={form.postal_code} onChange={e=>u('postal_code',e.target.value)}/>
              </div>
            </div>

            <div style={{marginTop:20,borderTop:'1px solid var(--border)',paddingTop:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text-dim)',marginBottom:12,textTransform:'uppercase'}}>Kontakt</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <div><label>Telefon</label><input value={form.phone} onChange={e=>u('phone',e.target.value)}/></div>
                <div><label>Email</label><input value={form.email} onChange={e=>u('email',e.target.value)}/></div>
                <div><label>Osoba kontaktowa</label><input value={form.contact_person} onChange={e=>u('contact_person',e.target.value)}/></div>
                <div><label>Tel. kontaktowy</label><input value={form.contact_phone} onChange={e=>u('contact_phone',e.target.value)}/></div>
              </div>
            </div>

            <div style={{marginTop:20,borderTop:'1px solid var(--border)',paddingTop:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text-dim)',marginBottom:12,textTransform:'uppercase'}}>Dane bankowe</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <div><label>Nazwa banku</label><input value={form.bank_name} onChange={e=>u('bank_name',e.target.value)}/></div>
                <div><label>Nr konta</label><input value={form.bank_account} onChange={e=>u('bank_account',e.target.value)}/></div>
                <div><label>Termin platnosci (dni)</label><input type="number" value={form.payment_terms_days} onChange={e=>u('payment_terms_days',e.target.value)}/></div>
              </div>
            </div>

            <div style={{marginTop:20}}>
              <label>Notatki</label>
              <textarea value={form.notes||''} onChange={e=>u('notes',e.target.value)}/>
            </div>
            </>)}
            {subTab === 'vehicles' && showFleet && <VehiclesPanel companyId={company.id} addToast={addToast}/>}
            {subTab === 'drivers' && showFleet && <DriversPanel companyId={company.id} addToast={addToast}/>}

            <div style={{marginTop:24,display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={onClose} style={{flex:1,justifyContent:'center'}}>Anuluj</button>
              <button className="btn btn-green" onClick={handleSave} disabled={saving} style={{flex:1,justifyContent:'center'}}>
                {saving ? <div className="spinner" style={{width:14,height:14}}/> : null} {isEdit ? 'Zapisz zmiany' : 'Dodaj firme'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== VEHICLES PANEL ====================
    function VehiclesPanel({ companyId, addToast }) {
      const [vehicles, setVehicles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showAdd, setShowAdd] = useState(false);
      const [editV, setEditV] = useState(null);
      const empty = {truck_plate:'',trailer_plate:'',trailer_type:'MONO',adr_class:'',capacity_liters:'',is_food_grade:false,notes:''};
      const [vf, setVf] = useState(empty);

      const load = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from('vehicles').select('*').eq('company_id', companyId).order('created_at',{ascending:false});
        setVehicles(data || []);
        setLoading(false);
      }, [companyId]);
      useEffect(() => { load(); }, []);

      const save = async () => {
        if (!vf.truck_plate) { addToast('Podaj nr rej ciagnika','error'); return; }
        const p = {...vf, company_id: companyId}; delete p.id; delete p.created_at;
        let error;
        if (editV) { ({error} = await sb.from('vehicles').update(p).eq('id', editV.id)); }
        else { ({error} = await sb.from('vehicles').insert(p)); }
        if (error) addToast('Blad: '+error.message,'error');
        else { addToast(editV?'Pojazd zaktualizowany':'Pojazd dodany!','success'); setShowAdd(false); setEditV(null); setVf(empty); load(); }
      };
      const del = async (id) => { await sb.from('vehicles').delete().eq('id',id); addToast('Pojazd usuniety','success'); load(); };
      const uf = (k,v) => setVf(p=>({...p,[k]:v}));

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:600}}>Pojazdy ({vehicles.length})</div>
            <button className="btn btn-primary" onClick={()=>{setEditV(null);setVf(empty);setShowAdd(true)}} style={{fontSize:11,padding:'4px 12px'}}>+ Dodaj pojazd</button>
          </div>
          {showAdd && (
            <div style={{background:'rgba(99,102,241,.05)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:14,marginBottom:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><label style={{fontSize:11}}>Nr rej. ciagnika *</label><input value={vf.truck_plate} onChange={e=>uf('truck_plate',e.target.value.toUpperCase())} placeholder="WA 12345"/></div>
                <div><label style={{fontSize:11}}>Nr rej. naczepy</label><input value={vf.trailer_plate} onChange={e=>uf('trailer_plate',e.target.value.toUpperCase())} placeholder="WA 67890"/></div>
                <div><label style={{fontSize:11}}>Typ naczepy</label>
                  <select value={vf.trailer_type} onChange={e=>uf('trailer_type',e.target.value)}>
                    <option value="MONO">Mono (1 komora)</option>
                    <option value="MULTI">Multi (wiele komor)</option>
                  </select>
                </div>
                <div><label style={{fontSize:11}}>Klasa ADR</label><input value={vf.adr_class} onChange={e=>uf('adr_class',e.target.value)} placeholder="ADR 3,6.1"/></div>
                <div><label style={{fontSize:11}}>Pojemnosc (L)</label><input type="number" value={vf.capacity_liters} onChange={e=>uf('capacity_liters',e.target.value)} placeholder="34000"/></div>
                <div style={{display:'flex',alignItems:'end'}}>
                  <label style={{fontSize:11,display:'flex',alignItems:'center',gap:6}}>
                    <input type="checkbox" checked={vf.is_food_grade} onChange={e=>uf('is_food_grade',e.target.checked)} style={{width:16,height:16}}/>
                    Food grade
                  </label>
                </div>
                <div style={{gridColumn:'1/-1'}}><label style={{fontSize:11}}>Notatki</label><input value={vf.notes||''} onChange={e=>uf('notes',e.target.value)}/></div>
              </div>
              <div style={{display:'flex',gap:6,marginTop:10}}>
                <button className="btn btn-ghost" onClick={()=>setShowAdd(false)} style={{fontSize:11,padding:'4px 12px'}}>Anuluj</button>
                <button className="btn btn-green" onClick={save} style={{fontSize:11,padding:'4px 12px'}}>{editV?'Zapisz':'Dodaj'}</button>
              </div>
            </div>
          )}
          {loading ? <div style={{textAlign:'center',padding:20}}><div className="spinner"/></div> :
           vehicles.length === 0 ? <div style={{color:'var(--text-dim)',fontSize:13,textAlign:'center',padding:20}}>Brak pojazdow</div> :
           <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {vehicles.map(v => (
              <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'rgba(255,255,255,.02)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,fontFamily:'JetBrains Mono'}}>{v.truck_plate}{v.trailer_plate?' / '+v.trailer_plate:''}</div>
                  <div style={{fontSize:11,color:'var(--text-dim)',marginTop:2}}>
                    {v.trailer_type==='MULTI'?'Multi':'Mono'}
                    {v.adr_class?' | ADR: '+v.adr_class:''}
                    {v.capacity_liters?' | '+v.capacity_liters+'L':''}
                    {v.is_food_grade?' | Food':''}
                  </div>
                </div>
                <button className="btn-icon" onClick={()=>{setEditV(v);setVf({...v});setShowAdd(true)}} style={{fontSize:12}}>E</button>
                <button className="btn-icon" onClick={()=>del(v.id)} style={{fontSize:12,color:'var(--accent-red)'}}>X</button>
              </div>
            ))}
           </div>
          }
        </div>
      );
    }

    // ==================== DRIVERS PANEL ====================
    function DriversPanel({ companyId, addToast }) {
      const [drivers, setDrivers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showAdd, setShowAdd] = useState(false);
      const [editD, setEditD] = useState(null);
      const empty = {first_name:'',last_name:'',phone:'',license_number:'',adr_certificate:'',adr_expiry:'',notes:''};
      const [df, setDf] = useState(empty);

      const load = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from('drivers').select('*').eq('company_id', companyId).order('created_at',{ascending:false});
        setDrivers(data || []);
        setLoading(false);
      }, [companyId]);
      useEffect(() => { load(); }, []);

      const save = async () => {
        if (!df.first_name || !df.last_name) { addToast('Podaj imie i nazwisko','error'); return; }
        const p = {...df, company_id: companyId}; delete p.id; delete p.created_at;
        let error;
        if (editD) { ({error} = await sb.from('drivers').update(p).eq('id', editD.id)); }
        else { ({error} = await sb.from('drivers').insert(p)); }
        if (error) addToast('Blad: '+error.message,'error');
        else { addToast(editD?'Kierowca zaktualizowany':'Kierowca dodany!','success'); setShowAdd(false); setEditD(null); setDf(empty); load(); }

    // ==================== ORDERS MODULE (Etap 3 - z filtrami) ====================
    function OrdersModule({ addToast, onStatsChange, currentUser }) {
      const [view, setView] = useState('list');
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [ocrData, setOcrData] = useState(null);
      const [editingOrder, setEditingOrder] = useState(null);
      const [search, setSearch] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [detailOrder, setDetailOrder] = useState(null);

      const fetchOrders = useCallback(async () => {
        setLoading(true);
        const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
        if (error) addToast('Blad ladowania zlecen: ' + error.message, 'error');
        else {
          // Map DB columns to frontend fields
          const mapped = (data||[]).map(o => ({...o,
            price_carrier: o.price_carrier || o.price_buy || null,
            driver_document: o.driver_document || o.driver_id_number || null,
          }));
          setOrders(mapped);
        }
        setLoading(false);
      }, []);

      useEffect(() => { fetchOrders(); }, []);

      const filtered = useMemo(() => {
        return orders.filter(o => {
          const q = search.toLowerCase();
          const matchSearch = !q || (o.order_number||'').toLowerCase().includes(q) ||
            (o.client_name||'').toLowerCase().includes(q) || (o.carrier_name||'').toLowerCase().includes(q) ||
            (o.loading_city||'').toLowerCase().includes(q) || (o.unloading_city||'').toLowerCase().includes(q) ||
            (o.route_description||'').toLowerCase().includes(q);
          const matchStatus = statusFilter === 'all' || o.status === statusFilter;
          return matchSearch && matchStatus;
        });
      }, [orders, search, statusFilter]);

      const handleStatusChange = async (orderId, newStatus) => {
        const { error } = await sb.from('orders').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', orderId);
        if (error) { addToast('Blad zmiany statusu: ' + error.message, 'error'); return; }
        addToast('Status zmieniony na: ' + statusLabel(newStatus), 'success');
        fetchOrders();
        // Auto-generate notification
        const order = orders.find(o => o.id === orderId);
        const notifData = getNotificationsForStatusChange(newStatus, order);
        for (const n of notifData) {
          await sb.from('notifications').insert(n);
        }
      };

      const handleOCRResult = (data) => { setOcrData(data); setView('form'); };
      const handleFormSave = () => { setView('list'); setOcrData(null); setEditingOrder(null); fetchOrders(); onStatsChange(); };
      const handleFormCancel = () => { setView('list'); setOcrData(null); setEditingOrder(null); };

      if (view === 'upload') return <OrderUpload addToast={addToast} onResult={handleOCRResult} onCancel={() => setView('list')}/>;
      if (view === 'form') return <OrderForm addToast={addToast} ocrData={ocrData} editOrder={editingOrder} onSave={handleFormSave} onCancel={handleFormCancel} currentUser={currentUser}/>;
      if (detailOrder) return <OrderDetail key={detailOrder.id+'-'+(detailOrder.updated_at||'')} order={detailOrder} addToast={addToast} onBack={() => { setDetailOrder(null); fetchOrders(); }} onEdit={(o) => { setDetailOrder(null); setEditingOrder(o); setView('form'); }}/>;

      return (
        <div className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
            <h2 style={{fontSize:22,fontWeight:700,flex:1}}>Zlecenia Transportowe</h2>
            <button className="btn btn-green" onClick={() => setView('upload')}>+ Nowe zlecenie</button>
          </div>

          {/* Filters */}
          <div className="filter-bar">
            <input placeholder="Szukaj zlecen..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:200}}/>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
              <option value="all">Wszystkie statusy</option>
              {ALL_STATUSES.map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
            </select>
            {(search || statusFilter !== 'all') && (
              <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setStatusFilter('all')}}>Reset</button>
            )}
            <span style={{color:'var(--text-muted)',fontSize:12}}>{filtered.length} z {orders.length}</span>
          </div>

          <div className="card" style={{padding:0,overflow:'hidden'}}>
            {loading ? (
              <div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Ladowanie...</div>
            ) : orders.length === 0 ? (
              <div style={{padding:60,textAlign:'center'}}>
                <p style={{color:'var(--text-dim)',marginBottom:8}}>Brak zlecen - uploaduj pierwsze zlecenie klienta!</p>
                <button className="btn btn-primary" onClick={() => setView('upload')} style={{marginTop:12}}>Upload zlecenia</button>
              </div>
            ) : (
              <div style={{overflowX:'auto'}}>
                <table className="tbl">
                  <thead><tr>
                    <th>Nr zlecenia</th><th>Trasa</th><th>Klient</th><th>Przewoznik</th><th>Osoba</th>
                    <th>Status</th><th>Data zalad.</th><th>Cena klienta</th><th>Cena przewoz.</th><th>Marza</th><th>Akcje</th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(o => {
                      const priceClient = parseFloat(o.price_amount) || 0;
                      const priceCarrier = parseFloat(o.price_carrier) || 0;
                      const margin = priceClient - priceCarrier;
                      const marginPct = priceClient > 0 ? ((margin / priceClient) * 100).toFixed(0) : 0;
                      return (
                      <tr key={o.id} style={{cursor:'pointer'}} onClick={()=>setDetailOrder(o)}>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,fontWeight:600}}>{o.order_number}</td>
                        <td style={{fontSize:13}}>{o.route_description || '---'}</td>
                        <td style={{fontSize:12}}>{o.client_name || '---'}</td>
                        <td style={{fontSize:12}}>{o.carrier_name || <span style={{color:'var(--accent-orange)'}}>Przypisz</span>}</td>
                        <td style={{fontSize:11}}>{(() => { const u = TEAM_USERS.find(t=>t.id===o.assigned_user); return u ? u.name : <span style={{color:'var(--text-dim)'}}>---</span>; })()}</td>
                        <td onClick={e=>e.stopPropagation()}>
                          <select value={o.status||'draft'} onChange={e=>handleStatusChange(o.id, e.target.value)}
                            style={{padding:'2px 6px',fontSize:11,width:'auto',minWidth:100,background:'transparent',border:'1px solid var(--border)',borderRadius:12,color:'var(--text)'}}>
                            {ALL_STATUSES.map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
                          </select>
                        </td>
                        <td style={{fontSize:12}}>{o.loading_date ? o.loading_date.slice(0,10).split('-').reverse().join('.') : '---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{priceClient ? `${priceClient} ${o.price_currency||'EUR'}` : '---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{priceCarrier ? `${priceCarrier} ${o.price_currency||'EUR'}` : '---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,color: margin > 0 ? 'var(--accent-green)' : margin < 0 ? 'var(--accent-red)' : 'var(--text-dim)'}}>
                          {priceClient > 0 && priceCarrier > 0 ? `${margin} (${marginPct}%)` : '---'}
                        </td>
                        <td onClick={e=>e.stopPropagation()}>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn-icon" title="Edytuj" onClick={() => { setEditingOrder(o); setView('form'); }}>E</button>
                            <button className="btn-icon" title="PDF" onClick={() => generateTransportOrderPDF(o, addToast)}>P</button>
                          </div>
                        </td>
                      </tr>
                    )})}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== ORDER DETAIL VIEW (Etap 3) ====================
    function OrderDetail({ order, addToast, onBack, onEdit }) {
      const [tab, setTab] = useState('dane');
      const [o, setO] = useState(order);
      const [docs, setDocs] = useState([]);
      const [docsLoading, setDocsLoading] = useState(false);
      const [uploading, setUploading] = useState(false);

      const loadDocs = useCallback(async () => {
        setDocsLoading(true);
        try {
          // Load from Supabase order_documents
          const { data } = await sb.from('order_documents').select('*').eq('order_id', o.id).order('created_at', { ascending: false });
          setDocs(data || []);
        } catch(e) { console.error('Docs load error:', e); }
        setDocsLoading(false);
      }, [o.id]);

      useEffect(() => { if (tab === 'dokumenty') loadDocs(); }, [tab]);

      const gasPost = async (body) => {
        const resp = await fetch(GAS_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(body) });
        if (!resp.ok && resp.status !== 0) throw new Error('Server error: ' + resp.status);
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        return data;
      };

      const createDriveFolder = async () => {
        try {
          const result = await gasPost({ action: 'createFolder', orderNumber: o.order_number });
          if (result.folderId) {
            await sb.from('orders').update({ drive_folder_id: result.folderId }).eq('id', o.id);
            setO(prev => ({...prev, drive_folder_id: result.folderId}));
            addToast(result.created ? 'Folder Drive utworzony!' : 'Folder Drive juz istnieje', 'success');
          }
          return result;
        } catch(e) { addToast('Blad tworzenia folderu: ' + e.message, 'error'); return null; }
      };

      const uploadDocToDrive = async (file, docType) => {
        setUploading(true);
        try {
          let folderId = o.drive_folder_id;
          if (!folderId) {
            const folderResult = await createDriveFolder();
            if (!folderResult?.folderId) { setUploading(false); return; }
            folderId = folderResult.folderId;
          }
          const base64 = await new Promise((ok, fail) => {
            const r = new FileReader(); r.onload = () => ok(r.result.split(',')[1]); r.onerror = fail; r.readAsDataURL(file);
          });
          const result = await gasPost({ action: 'upload', folderId, fileName: file.name, mimeType: file.type, base64Content: base64, documentType: docType });
          if (result.fileId) {
            await sb.from('order_documents').insert({
              order_id: o.id, document_type: docType, file_name: file.name,
              file_url: result.fileUrl, drive_file_id: result.fileId, drive_folder_id: folderId,
              uploaded_by: 'user:dashboard'
            });
            addToast('Dokument wgrany!', 'success');
            loadDocs();
          }
        } catch(e) { addToast('Blad uploadu: ' + e.message, 'error'); }
        setUploading(false);
      };

      const sendCMRRequest = async () => {
        if (!o.carrier_email) { addToast('Brak emaila przewoznika!', 'error'); return; }
        try {
          addToast('Wysylanie prosby o CMR...', 'info');
          const tokenResult = await gasPost({ action: 'generateUploadToken', orderNumber: o.order_number, documentType: 'cmr' });
          const assignedUser = TEAM_USERS.find(u => u.id === o.assigned_user);
          await gasPost({
            action: 'sendEmail',
            to: o.carrier_email,
            cc: (assignedUser?.email || '') + ',' + PLANNING_EMAIL,
            subject: 'CMR Request - ' + o.order_number + ' - Route 11',
            htmlBody: `<div style="font-family:Arial;max-width:600px;margin:0 auto"><div style="background:#0c0e14;padding:20px;text-align:center"><h1 style="color:#3b82f6;margin:0">ROUTE11</h1></div><div style="padding:24px;background:#f8f9fa"><p>Dear ${o.carrier_name||'Partner'},</p><p>Please upload the CMR document for transport order <b>${o.order_number}</b>.</p><div style="text-align:center;margin:24px 0"><a href="${tokenResult.uploadUrl}" style="background:#3b82f6;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:bold;display:inline-block">Upload CMR Document</a></div><p style="color:#666;font-size:13px">This link is valid for 72 hours.</p></div></div>`,
            textBody: 'Please upload CMR for order ' + o.order_number
          });
          addToast('Prosba o CMR wyslana na ' + o.carrier_email + '!', 'success');
        } catch(e) { addToast('Blad wysylki: ' + e.message, 'error'); }
      };

      const sendWhatsAppCMR = async () => {
        if (!o.carrier_phone) { addToast('Brak telefonu przewoznika!', 'error'); return; }
        try {
          addToast('Wysylanie WhatsApp...', 'info');
          await gasPost({
            action: 'sendWhatsApp',
            phone: o.carrier_phone.replace(/[^0-9]/g, ''),
            message: 'Dear ' + (o.carrier_name||'Partner') + ', please send CMR for order ' + o.order_number + '. You can upload it here: https://dashboard.route11.eu/upload.html - Route 11'
          });
          addToast('WhatsApp wyslany do ' + o.carrier_phone + '!', 'success');
        } catch(e) { addToast('Blad WhatsApp: ' + e.message, 'error'); }
      };

      const priceClient = parseFloat(o.price_amount) || 0;
      const priceCarrier = parseFloat(o.price_carrier) || 0;
      const margin = priceClient - priceCarrier;

      return (
        <div className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
            <button className="btn btn-ghost btn-sm" onClick={onBack}>Wroc</button>
            <h2 style={{fontSize:20,fontWeight:700,flex:1}}>{o.order_number} | {o.route_description || 'Brak trasy'}</h2>
            <span className={`badge ${statusBadge(o.status)}`}>{statusLabel(o.status)}</span>
            <button className="btn btn-primary btn-sm" onClick={()=>onEdit(o)}>Edytuj</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>generateTransportOrderPDF(o, addToast)}>PDF</button>
          </div>

          <div className="tab-bar">
            {['dane','dokumenty','finanse','timeline'].map(t => (
              <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
                {({dane:'Dane',dokumenty:`Dokumenty (${docs.length})`,finanse:'Finanse',timeline:'Timeline'})[t]}
              </button>
            ))}
          </div>

          {tab === 'dane' && (

    // ==================== ORDER UPLOAD (OCR) ====================
    function OrderUpload({ addToast, onResult, onCancel }) {
      const [dragging, setDragging] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [progress, setProgress] = useState('');
      const fileRef = useRef(null);

      const processFile = async (file) => {
        if (!file) return;
        if (file.size > 10*1024*1024) { addToast('Plik za duzy (max 10MB)', 'error'); return; }
        const allowed = ['application/pdf', 'image/jpeg', 'image/png', 'image/webp'];
        if (!allowed.includes(file.type)) { addToast('Format: PDF, JPG, PNG lub WebP', 'error'); return; }

        setProcessing(true);
        setProgress('Konwertowanie pliku...');
        try {
          const base64 = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
          });

          setProgress('Wysylanie do Gemini Flash...');
          const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`;
          const r = await fetch(geminiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { inlineData: { mimeType: file.type, data: base64 } },
                { text: OCR_PROMPT }
              ]}],
              generationConfig: { temperature: 0.1, maxOutputTokens: 4096, responseMimeType: 'application/json' }
            })
          });

          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error?.message || `Gemini HTTP ${r.status}`);
          }

          setProgress('Analizowanie odpowiedzi AI...');
          const geminiResult = await r.json();
          const text = geminiResult.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error('Pusta odpowiedz Gemini');

          const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          const parsed = JSON.parse(clean);

          setProgress('Dane wyciagniete!');
          addToast('Zlecenie zparsowane przez AI!', 'success');
          setTimeout(() => onResult(parsed), 500);
        } catch (err) {
          addToast('Blad OCR: ' + err.message, 'error');
          setProcessing(false);
          setProgress('');
        }
      };

      return (
        <div className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
            <button className="btn btn-ghost btn-sm" onClick={onCancel}>Wroc</button>
            <h2 style={{fontSize:22,fontWeight:700}}>Upload zlecenia klienta</h2>
          </div>

          <div className="card" style={{textAlign:'center',padding:'60px 40px'}}>
            {processing ? (
              <div>
                <div className="spinner" style={{width:40,height:40,margin:'0 auto 20px',borderWidth:3}}/>
                <p style={{fontSize:16,fontWeight:600,marginBottom:8}}>{progress}</p>
                <p style={{color:'var(--text-dim)',fontSize:13}}>Gemini Flash analizuje dokument...</p>
              </div>
            ) : (
              <div
                onDrop={e=>{e.preventDefault();setDragging(false);processFile(e.dataTransfer.files[0])}}
                onDragOver={e=>{e.preventDefault();setDragging(true)}}
                onDragLeave={()=>setDragging(false)}
                onClick={()=>fileRef.current?.click()}
                style={{
                  border:`2px dashed ${dragging?'var(--accent-blue)':'var(--border)'}`,
                  borderRadius:'var(--radius-lg)',padding:'60px 40px',cursor:'pointer',
                  transition:'all .3s',background:dragging?'rgba(59,130,246,.05)':'transparent'
                }}
              >
                <div style={{fontSize:64,marginBottom:16}}>Upload</div>
                <p style={{fontSize:18,fontWeight:600,marginBottom:8}}>Przeciagnij zlecenie klienta</p>
                <p style={{color:'var(--text-dim)',fontSize:14,marginBottom:20}}>lub kliknij zeby wybrac plik</p>
                <p style={{color:'var(--text-muted)',fontSize:12}}>PDF, JPG, PNG, WebP - max 10MB</p>
                <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.webp" style={{display:'none'}}
                  onChange={e=>processFile(e.target.files[0])}/>
              </div>
            )}
          </div>
        </div>
      );
    }

    function CompanySelect({ label, filterType, value, onSelect, addToast }) {
      const [companies, setCompanies] = useState([]);
      const [search, setSearch] = useState(value || '');
      const [open, setOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        (async () => {
          setLoading(true);
          let q = sb.from('companies').select('*').order('name');
          if (filterType === 'client') q = q.in('company_type', ['client','both']);
          if (filterType === 'carrier') q = q.in('company_type', ['carrier','both']);
          const { data } = await q;
          setCompanies(data || []);
          setLoading(false);
        })();
      }, [filterType]);

      useEffect(() => { setSearch(value || ''); }, [value]);

      // Close on outside click
      useEffect(() => {
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      });

          <label>{label}</label>
          <input
            value={search}
            onChange={e => { setSearch(e.target.value); setOpen(true); onSelect(null, e.target.value); }}

    function OrderForm({ addToast, ocrData, editOrder, onSave, onCancel, currentUser }) {

        if (editOrder) {

          if (!eo.participant_2) eo.participant_2 = '';
          return eo;
        }
        const d = ocrData || {};
        const cl = d.client || {};
        const ld = (d.loading && d.loading[0]) || {};
        const ul = (d.unloading && d.unloading[0]) || {};
        const cg = d.cargo || {};
        const pr = d.price || {};
        return {

          client_city: cl.city||'', client_country: cl.country||'', client_phone: cl.contact_phone||'', client_email: cl.contact_email||'',

          loading_date: ld.date||'', loading_time_from: ld.time_from||'', loading_time_to: ld.time_to||'', loading_reference: ld.reference||'',
          unloading_company: ul.company_name||'', unloading_address: ul.address||'', unloading_city: ul.city||'',

          unloading_date: ul.date||'', unloading_time_from: ul.time_from||'', unloading_time_to: ul.time_to||'', unloading_reference: ul.reference||'',
          cargo_description: cg.description||'', cargo_weight: cg.weight_kg||'', cargo_volume: cg.volume_m3||'',
          cargo_packaging: cg.packaging||'', cargo_adr: cg.adr||'',
          vehicle_type: '', vehicle_plates: '', trailer_plates: '',
          driver_name: '', driver_phone: '', driver_document: '',
          carrier_name: '', carrier_vat: '', carrier_address: '', carrier_city: '', carrier_country: '',
          carrier_phone: '', carrier_email: '',
          price_amount: pr.amount||'', price_currency: pr.currency||'EUR', payment_terms_days: pr.payment_terms_days||30,
          price_carrier: '', carrier_payment_days: 45,
          special_conditions: d.special_conditions||'',
          route_description: d.route_description||'',
          assigned_user: '',
          participant_2: ''
        };
      };

      const [form, setForm] = useState(() => {
        const init = buildInitForm();
        if (!isEdit && currentUser) init.assigned_user = currentUser;
        return init;
      });
      const u = (k,v) => setForm(p => ({...p,[k]:v}));

      const selectClient = (company, manualName) => {
        if (company) {
          setForm(p => ({...p,
            client_name: company.name, client_vat: company.vat_number||'',
            client_address: company.address||'', client_city: company.city||'',
            client_country: company.country||'', client_phone: company.phone||'',
            client_email: company.email||'', payment_terms_days: company.payment_terms_days||30
          }));
          addToast('Klient wybrany: ' + company.name, 'success');
        } else if (manualName !== undefined) {
          u('client_name', manualName);
        }
      };

      const [carrierVehicles, setCarrierVehicles] = useState([]);
      const [carrierDrivers, setCarrierDrivers] = useState([]);

      const selectCarrier = (company, manualName) => {
        if (company) {
          setForm(p => ({...p,
            carrier_name: company.name, carrier_vat: company.vat_number||'',
            carrier_address: company.address||'', carrier_city: company.city||'',
            carrier_country: company.country||'', carrier_phone: company.phone||'',
            carrier_email: company.email||'', carrier_payment_days: company.payment_terms_days||45
          }));
          addToast('Przewoznik wybrany: ' + company.name, 'success');
          // Fetch carrier vehicles & drivers
          sb.from('vehicles').select('*').eq('company_id', company.id).then(({data}) => setCarrierVehicles(data||[]));
          sb.from('drivers').select('*').eq('company_id', company.id).then(({data}) => setCarrierDrivers(data||[]));
        } else if (manualName !== undefined) {
          u('carrier_name', manualName);
        }
      };

      const [carrierVatChecking, setCarrierVatChecking] = useState(false);

      const checkCarrierVAT = async () => {
        if (!form.carrier_vat) return;
        setCarrierVatChecking(true);
        try {
          const data = await verifyVAT(form.carrier_vat.toUpperCase().replace(/\s/g,''));
          if (data.valid) {
            u('carrier_name', data.name || form.carrier_name);
            if (data.address) {
              const parts = data.address.split('\n');
              u('carrier_address', parts[0]||'');
              if (parts[1]) {
                const m2 = parts[1].match(/(\d[\d\s-]*)\s+(.+)/);
                if (m2) u('carrier_city', m2[2].trim());
                else u('carrier_city', parts[1].trim());

          {form.special_conditions && (
