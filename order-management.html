              <h4 style={{fontSize:12,color:'var(--text-dim)',marginBottom:8,textTransform:'uppercase'}}>Warunki specjalne</h4>
              <p style={{fontSize:13,whiteSpace:'pre-wrap'}}>{form.special_conditions}</p>
            </div>
          )}

          {(form.vehicle_plates || form.driver_name) && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <div><h4 style={{color:'var(--accent-cyan)',fontSize:12,textTransform:'uppercase',marginBottom:8}}>Pojazd</h4>
                <p style={{fontWeight:600}}>{form.vehicle_plates||'---'}{form.trailer_plates?' / '+form.trailer_plates:''}</p>
              </div>
              <div><h4 style={{color:'var(--accent-cyan)',fontSize:12,textTransform:'uppercase',marginBottom:8}}>Kierowca</h4>
                <p style={{fontWeight:600}}>{form.driver_name||'---'}</p>
                <p style={{fontSize:12,color:'var(--text-dim)'}}>{form.driver_phone||''}{form.driver_document?' | Dok: '+form.driver_document:''}</p>
              </div>
            </div>
          )}

          <div style={{display:'flex',gap:8,marginTop:16,flexWrap:'wrap'}}>
            <button className="btn btn-ghost" onClick={() => setStep(2)} style={{flex:1,justifyContent:'center'}}>Wroc</button>
            <button className="btn btn-ghost" onClick={() => generateTransportOrderPDF({...form, order_number: form.order_number||'DRAFT'}, addToast)} style={{justifyContent:'center',fontSize:12,color:'var(--accent-cyan)'}}>
              Podglad PDF
            </button>
            <button className="btn btn-green" onClick={() => handleSave(false)} disabled={saving} style={{flex:1,justifyContent:'center'}}>
              {saving?<div className="spinner" style={{width:14,height:14}}/>:null} Zapisz
            </button>
            <button className="btn btn-primary" onClick={() => handleSave(true)} disabled={saving} style={{flex:1,justifyContent:'center'}}>
              {saving?<div className="spinner" style={{width:14,height:14}}/>:null} Zapisz + Generuj PDF
            </button>
          </div>
        </div>
      )};

      return (
        <div className="fade-in" style={{maxWidth:900,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
            <button className="btn btn-ghost btn-sm" onClick={onCancel}>Wroc</button>
            <h2 style={{fontSize:20,fontWeight:700,flex:1}}>{isEdit ? 'Edytuj zlecenie' : 'Nowe zlecenie transportowe'}</h2>
            <div className="step-indicator">
              {[1,2,3].map(s => <div key={s} className={`step-dot ${s===step?'active':s<step?'done':''}`}/>)}
            </div>
          </div>
          {step === 1 && renderStep1()}
          {step === 2 && renderStep2()}
          {step === 3 && renderStep3()}
        </div>
      );
    }

    // ==================== PDF GENERATOR (Bilingual EN + Carrier Language) ====================
    async function generateTransportOrderPDF(order, addToast) {
      try {
        if (!window.jspdf) {
          const urls = [
            'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js',
            'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js'
          ];
          for (const url of urls) {
            if (window.jspdf) break;
            try {
              const s = document.createElement('script'); s.src = url; document.head.appendChild(s);
              await new Promise((ok, fail) => { s.onload = ok; s.onerror = fail; setTimeout(ok, 4000); });
              if (window.jspdf) break;
            } catch(e) { console.warn('jsPDF CDN fail:', url); }
          }
        }
        if (!window.jspdf) { addToast('Cannot load PDF library. Please refresh.', 'error'); return; }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const W = 210, M = 15;
        let y = M;
        const ln = (inc=5) => { y += inc; };
        const txt = (t, x, opts={}) => { doc.text(String(t == null ? '---' : t), x, y, opts); };

        const en = PDF_I18N.en;
        const carrierCC = order.carrier_country || '';
        const lang2 = getCarrierLang(carrierCC);
        const lo = lang2 !== 'en' ? PDF_I18N[lang2] : null;
        // Bilingual label: "ENGLISH / Local"
        const bl = (key) => lo ? `${en[key]} / ${lo[key]}` : en[key];

        // === HEADER ===
        doc.setFillColor(12, 14, 20);
        doc.rect(0, 0, W, 40, 'F');
        doc.setTextColor(59, 130, 246);
        doc.setFontSize(22); doc.setFont('helvetica','bold');
        txt('ROUTE11', M);
        doc.setFontSize(9); doc.setTextColor(150);
        txt('Transport Management System', M + 55);
        doc.setFontSize(13); doc.setTextColor(255);
        txt(bl('title'), W - M, {align:'right'});
        doc.setFontSize(10);
        ln(7); txt(order.order_number || 'DRAFT', W - M, {align:'right'});
        doc.setTextColor(150); doc.setFontSize(8);
        ln(5); txt(new Date().toISOString().slice(0,10), W - M, {align:'right'});

        // === CLIENT / CARRIER ===
        y = 48;
        doc.setDrawColor(30, 35, 50);
        const col1 = M, col2 = W/2 + 5;
        doc.setTextColor(59,130,246); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(bl('client'), col1); txt(bl('carrier'), col2);
        ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
        txt(order.client_name || '---', col1); txt(order.carrier_name || '---', col2);
        ln(4); doc.setTextColor(80);
        txt(en.vat+': ' + (order.client_vat||'---'), col1); txt(en.vat+': ' + (order.carrier_vat||'---'), col2);
        ln(4); txt(order.client_address||'', col1); txt(order.carrier_address||'', col2);
        ln(4);
        txt((order.client_city||'')+' '+(order.client_country||''), col1);
        txt((order.carrier_city||'')+' '+(order.carrier_country||''), col2);
        ln(4); txt(en.phone+': '+(order.client_phone||'---'), col1); txt(en.phone+': '+(order.carrier_phone||'---'), col2);
        ln(4); txt(en.email+': '+(order.client_email||'---'), col1); txt(en.email+': '+(order.carrier_email||'---'), col2);

        // === LOADING / UNLOADING ===
        ln(6); doc.setDrawColor(200); doc.line(M,y,W-M,y); ln(6);
        doc.setTextColor(34,197,94); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(bl('loading'), col1); doc.setTextColor(239,68,68); txt(bl('unloading'), col2);
        ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
        txt(order.loading_company||'---', col1); txt(order.unloading_company||'---', col2);
        ln(4); doc.setTextColor(80);
        txt(order.loading_address||'', col1); txt(order.unloading_address||'', col2);
        ln(4);
        txt((order.loading_postal_code||'')+' '+(order.loading_city||'')+', '+(order.loading_country||''), col1);
        txt((order.unloading_postal_code||'')+' '+(order.unloading_city||'')+', '+(order.unloading_country||''), col2);
        ln(4); doc.setTextColor(0);
        txt(en.date+': '+(order.loading_date||'---')+' '+(order.loading_time_from||'')+(order.loading_time_to?'-'+order.loading_time_to:''), col1);
        txt(en.date+': '+(order.unloading_date||'---')+' '+(order.unloading_time_from||'')+(order.unloading_time_to?'-'+order.unloading_time_to:''), col2);
        ln(4);
        txt(en.ref+': '+(order.loading_reference||'---'), col1); txt(en.ref+': '+(order.unloading_reference||'---'), col2);

        // === CARGO ===
        ln(6); doc.line(M,y,W-M,y); ln(6);
        doc.setTextColor(245,158,11); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(bl('cargo'), col1);
        ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
        txt(en.description+': '+(order.cargo_description||'---'), col1); ln(4);
        txt(en.weight+': '+(order.cargo_weight||'---')+' kg | '+en.volume+': '+(order.cargo_volume||'---')+' m3', col1); ln(4);
        if (order.cargo_adr) { txt(en.adr+': '+order.cargo_adr, col1); ln(4); }

        // === VEHICLE / DRIVER ===
        ln(2); doc.line(M,y,W-M,y); ln(6);
        doc.setTextColor(6,182,212); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(bl('vehicle')+' / '+bl('driver'), col1);
        ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
        txt(en.truck+': '+(order.vehicle_plates||'---')+' | '+en.trailer+': '+(order.trailer_plates||'---'), col1); ln(4);
        txt(en.driver+': '+(order.driver_name||'---')+' | '+en.phone+': '+(order.driver_phone||'---'), col1);

        // === FINANCIAL ===
        ln(6); doc.line(M,y,W-M,y); ln(6);
        doc.setTextColor(168,85,247); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(bl('financial'), col1);
        ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
        const carrierPrice = order.price_carrier||order.price_buy||'---';
        const curr = order.price_currency||'EUR';
        txt(en.freight+': '+carrierPrice+' '+curr+' '+en.net, col1); ln(4);
        const payDays = order.carrier_payment_days||order.payment_terms_days||30;
        txt(en.paymentDays+': '+payDays+' '+en.days, col1);

        // === SPECIAL CONDITIONS ===
        if (order.special_conditions) {
          ln(6); doc.line(M,y,W-M,y); ln(6);
          doc.setTextColor(100); doc.setFontSize(9); doc.setFont('helvetica','bold');
          txt(bl('special'), col1);
          ln(5); doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0);
          var scLines = doc.splitTextToSize(String(order.special_conditions), W-2*M);
          doc.text(scLines, col1, y); y += scLines.length*4;
        }

        // === FOOTER ===
        y = 260; doc.setDrawColor(200); doc.line(M,y,W-M,y);
        ln(5); doc.setTextColor(150); doc.setFontSize(7);
        txt('Route 11 s.r.o. | Moravska Ostrava | CZ05714907 | office@route11.eu', M);
        ln(3); txt(en.generated+': '+new Date().toISOString().slice(0,16).replace('T',' ')+' | '+(order.order_number||''), M);

        doc.save((order.order_number||'order')+'_transport.pdf');
        addToast('PDF generated!', 'success');
        return doc.output('blob');
      } catch (err) {
        console.error('PDF error:', err);
        addToast('PDF error: '+err.message, 'error');
        return null;
      }
    }

    // ==================== CASH FLOW MODULE (Etap 7) ====================
    function CashFlowModule({ addToast }) {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        (async () => {
          const { data } = await sb.from('orders').select('*').neq('status','cancelled').order('loading_date', { ascending: true });
          setOrders((data||[]).map(o => ({...o, price_carrier: o.price_carrier||o.price_buy||null})));
          setLoading(false);
        })();
      }, []);

      // Calculate stats
      const stats = useMemo(() => {
        const now = new Date();
        const in30 = new Date(now.getTime() + 30*24*60*60*1000);
        let income = 0, expense = 0, overdue = 0, overdueCount = 0;
        orders.forEach(o => {
          const pc = parseFloat(o.price_amount) || 0;
          const pp = parseFloat(o.price_carrier) || 0;
          income += pc;
          expense += pp;
          // Check overdue (simplified: if loading_date is past and status not paid)
          if (o.loading_date && new Date(o.loading_date) < now && o.status !== 'paid' && o.status !== 'cancelled') {
            const days = Math.floor((now - new Date(o.loading_date)) / (24*60*60*1000));
            if (days > (o.payment_terms_days || 30)) { overdue += pc; overdueCount++; }
          }
        });
        return { income, expense, margin: income - expense, marginPct: income > 0 ? ((income-expense)/income*100).toFixed(1) : 0, overdue, overdueCount };
      }, [orders]);

      // Build chart
      useEffect(() => {
        if (!chartRef.current || orders.length === 0 || !window.Chart) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const days = [];
        const incomeData = [];
        const expenseData = [];
        const marginData = [];
        const now = new Date();

        for (let i = -30; i <= 30; i++) {
          const d = new Date(now.getTime() + i*24*60*60*1000);
          const label = d.toLocaleDateString('pl', {day:'2-digit',month:'2-digit'});
          days.push(label);

          let dayIncome = 0, dayExpense = 0;
          orders.forEach(o => {
            if (o.loading_date) {
              const ld = new Date(o.loading_date);
              if (ld.toDateString() === d.toDateString()) {
                dayIncome += parseFloat(o.price_amount) || 0;
                dayExpense += parseFloat(o.price_carrier) || 0;
              }
            }
          });

          const prevIncome = incomeData.length > 0 ? incomeData[incomeData.length-1] : 0;
          const prevExpense = expenseData.length > 0 ? expenseData[expenseData.length-1] : 0;
          incomeData.push(prevIncome + dayIncome);
          expenseData.push(prevExpense + dayExpense);
          marginData.push((prevIncome + dayIncome) - (prevExpense + dayExpense));
        }

        chartInstance.current = new window.Chart(chartRef.current.getContext('2d'), {
          type: 'line',
          data: {
            labels: days,
            datasets: [
              { label: 'Przychody', data: incomeData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3 },
              { label: 'Wydatki', data: expenseData, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3 },
              { label: 'Saldo', data: marginData, borderColor: '#3b82f6', borderDash: [5,5], tension: 0.3, fill: false }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#94a3b8' } },
              tooltip: { mode: 'index', intersect: false }
            },
            scales: {
              x: { ticks: { color: '#475569', maxTicksLimit: 15 }, grid: { color: 'rgba(30,35,50,0.5)' } },
              y: { ticks: { color: '#475569', callback: v => v + ' EUR' }, grid: { color: 'rgba(30,35,50,0.5)' } }
            }
          }
        });
      }, [orders]);

      if (loading) return <div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>Ladowanie danych...</div>;

      return (
        <div className="fade-in">
          <h2 style={{fontSize:22,fontWeight:700,marginBottom:20}}>Cash Flow</h2>

          {/* Summary Cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
            <div className="stat-card" style={{background:'rgba(34,197,94,.05)',borderColor:'rgba(34,197,94,.2)'}}>
              <div className="value" style={{color:'var(--accent-green)'}}>{stats.income.toLocaleString()}</div>
              <div className="label">Przychody (EUR)</div>
            </div>
            <div className="stat-card" style={{background:'rgba(239,68,68,.05)',borderColor:'rgba(239,68,68,.2)'}}>
              <div className="value" style={{color:'var(--accent-red)'}}>{stats.expense.toLocaleString()}</div>
              <div className="label">Wydatki (EUR)</div>
            </div>
            <div className="stat-card" style={{background:'rgba(59,130,246,.05)',borderColor:'rgba(59,130,246,.2)'}}>
              <div className="value" style={{color:'var(--accent-blue)'}}>{stats.margin.toLocaleString()} ({stats.marginPct}%)</div>
              <div className="label">Marza (EUR)</div>
            </div>
            <div className="stat-card" style={{background: stats.overdueCount > 0 ? 'rgba(239,68,68,.08)' : 'rgba(100,116,139,.05)', borderColor: stats.overdueCount > 0 ? 'rgba(239,68,68,.3)' : 'var(--border)'}}>
              <div className="value" style={{color: stats.overdueCount > 0 ? 'var(--accent-red)' : 'var(--text-muted)'}}>{stats.overdueCount}</div>
              <div className="label">Przeterminowane ({stats.overdue.toLocaleString()} EUR)</div>
            </div>
          </div>

          {/* Chart */}
          <div className="card" style={{marginBottom:24}}>
            <h4 style={{marginBottom:16,color:'var(--text-dim)',fontSize:13,textTransform:'uppercase'}}>Przychody vs Wydatki (60 dni)</h4>
            {orders.length === 0 ? (
              <p style={{textAlign:'center',color:'var(--text-muted)',padding:40}}>Brak danych do wykresu - dodaj zlecenia</p>
            ) : (
              <canvas ref={chartRef} height="100"/>
            )}
          </div>

          {/* Transactions Table */}
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
              <h4 style={{fontSize:13,textTransform:'uppercase',color:'var(--text-dim)'}}>Transakcje</h4>
            </div>
            <div style={{overflowX:'auto'}}>
              <table className="tbl">
                <thead><tr>
                  <th>Zlecenie</th><th>Trasa</th><th>Klient</th><th>Przychod</th><th>Koszt</th><th>Marza</th><th>Status</th>
                </tr></thead>
                <tbody>
                  {orders.map(o => {
                    const pc = parseFloat(o.price_amount)||0;
                    const pp = parseFloat(o.price_carrier)||0;
                    const m = pc - pp;
                    return (
                      <tr key={o.id}>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,fontWeight:600}}>{o.order_number}</td>
                        <td style={{fontSize:12}}>{o.route_description||'---'}</td>
                        <td style={{fontSize:12}}>{o.client_name||'---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,color:'var(--accent-green)'}}>{pc ? `+${pc}` : '---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,color:'var(--accent-red)'}}>{pp ? `-${pp}` : '---'}</td>
                        <td style={{fontFamily:'JetBrains Mono',fontSize:12,fontWeight:700,color:m>=0?'var(--accent-green)':'var(--accent-red)'}}>{pc&&pp?m:'---'}</td>
                        <td><span className={`badge ${statusBadge(o.status)}`}>{statusLabel(o.status)}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ==================== NOTIFICATION HELPERS ====================
    const NOTIF_TYPE_LABELS = {
      'DAY_BEFORE_LOADING': 'Dzien przed zaladunkiem',
      'LOADING_DAY_CMR': 'Dzien zaladunku - CMR',
      'CARRIER_CONFIRMATION': 'Potwierdzenie przewoznika',
      'DAY_BEFORE_PAYMENT_IN': 'Dzien przed platnoscia (przychod)',
      'DAY_BEFORE_PAYMENT_OUT': 'Dzien przed platnoscia (wydatek)',
      'PAYMENT_OVERDUE_IN': 'Przeterminowana platnosc (przychod)',
      'PAYMENT_OVERDUE_OUT': 'Przeterminowana platnosc (wydatek)',
      'CMR_REMINDER': 'Przypomnienie o CMR',
      'DELIVERY_CONFIRMATION': 'Potwierdzenie dostawy',
      'STATUS_CHANGE': 'Zmiana statusu',
      'CUSTOM': 'Inne'
    };
    const NOTIF_TYPE_ICONS = {
      'DAY_BEFORE_LOADING': '\u{1F69A}', 'LOADING_DAY_CMR': '\u{1F4CB}',
      'CARRIER_CONFIRMATION': '\u2705', 'DAY_BEFORE_PAYMENT_IN': '\u{1F4B0}',
      'DAY_BEFORE_PAYMENT_OUT': '\u{1F4B8}', 'PAYMENT_OVERDUE_IN': '\u26A0\uFE0F',
      'PAYMENT_OVERDUE_OUT': '\u26A0\uFE0F', 'CMR_REMINDER': '\u{1F4E4}',
      'DELIVERY_CONFIRMATION': '\u2705', 'STATUS_CHANGE': '\u{1F504}', 'CUSTOM': '\u{1F514}'
    };

    function getNotificationsForStatusChange(newStatus, order) {
      if (!order) return [];
      const route = `${order.loading_city||''} -> ${order.unloading_city||''}`;
      const nr = order.order_number || 'brak';
      const now = new Date().toISOString();
      const notifications = [];

      notifications.push({
        order_id: order.id, notification_type: 'STATUS_CHANGE', channel: 'dashboard',
        scheduled_at: now, title: `Status zmieniony: ${nr}`,
        message: `Zlecenie ${nr} (${route}) zmienilo status na: ${statusLabel(newStatus)}`,
        status: 'PENDING'
      });

      if (newStatus === 'confirmed' && order.loading_date) {
        const ld = new Date(order.loading_date);
        ld.setDate(ld.getDate() - 1);
        notifications.push({
          order_id: order.id, notification_type: 'DAY_BEFORE_LOADING', channel: 'dashboard',
          scheduled_at: ld.toISOString(), title: `Jutro zaladunek: ${nr}`,
          message: `Jutro zaladunek zlecenia ${nr}. Trasa: ${route}. Potwierdz gotowosc przewoznika.`,
          status: 'PENDING'
        });
      }

      if (newStatus === 'loading') {
        const t16 = new Date(); t16.setHours(16,0,0,0);
        notifications.push({
          order_id: order.id, notification_type: 'LOADING_DAY_CMR', channel: 'dashboard',
          scheduled_at: t16 > new Date() ? t16.toISOString() : now,
          title: `Wyslij CMR: ${nr}`,
          message: `Prosimy o przeslanie CMR i kwitu wagowego dla zlecenia ${nr}.`,
          status: 'PENDING'
        });
      }

      if (newStatus === 'delivered') {
        const tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        notifications.push({
          order_id: order.id, notification_type: 'CMR_REMINDER', channel: 'dashboard',
          scheduled_at: tmr.toISOString(), title: `Podpisany CMR: ${nr}`,
          message: `Prosimy o przeslanie podpisanego CMR dla zlecenia ${nr}.`,
          status: 'PENDING'
        });
      }

      if (newStatus === 'invoiced') {
        const days = parseInt(order.payment_terms_days) || 30;
        const due = new Date(); due.setDate(due.getDate() + days);
        const dayBefore = new Date(due); dayBefore.setDate(dayBefore.getDate() - 1);
        notifications.push({
          order_id: order.id, notification_type: 'DAY_BEFORE_PAYMENT_IN', channel: 'dashboard',
          scheduled_at: dayBefore.toISOString(), title: `Jutro termin platnosci: ${nr}`,
          message: `Jutro uplywa termin platnosci od klienta za zlecenie ${nr}. Kwota: ${order.price_amount||'?'} ${order.price_currency||'EUR'}.`,
          status: 'PENDING'
        });
        const carrierDays = parseInt(order.carrier_payment_days) || 45;
        const carrierDue = new Date(); carrierDue.setDate(carrierDue.getDate() + carrierDays);
        const carrierBefore = new Date(carrierDue); carrierBefore.setDate(carrierBefore.getDate() - 1);
        notifications.push({
          order_id: order.id, notification_type: 'DAY_BEFORE_PAYMENT_OUT', channel: 'dashboard',
          scheduled_at: carrierBefore.toISOString(), title: `Platnosc dla przewoznika: ${nr}`,
          message: `Jutro termin platnosci dla przewoznika za zlecenie ${nr}. Kwota: ${order.price_carrier||'?'} ${order.price_currency||'EUR'}.`,
          status: 'PENDING'
        });
      }

      return notifications;
    }

    // ==================== DOCUMENTS PANEL ====================
    function DocumentsPanel({ addToast, onRefresh }) {
      const [documents, setDocuments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');
      const [typeFilter, setTypeFilter] = useState('all');

      const fetchDocuments = useCallback(async () => {
        setLoading(true);
        try {
          const res = await fetch(GAS_URL + '?action=getDocuments&secret=' + API_SECRET);
          const data = await res.json();
          if (data.success) setDocuments(data.documents || []);
        } catch (e) {
          addToast('Błąd ładowania dokumentów', 'error');
        }
        setLoading(false);
      }, []);
      useEffect(() => { fetchDocuments(); }, []);

      const updateStatus = async (docId, status) => {
        try {
          const payload = encodeURIComponent(JSON.stringify({ docId, status }));
          const res = await fetch(GAS_URL + '?action=updateDocStatus&secret=' + API_SECRET + '&payload=' + payload);
          const data = await res.json();
          if (data.success) {
            addToast('Status dokumentu zmieniony', 'success');
            fetchDocuments();
            onRefresh && onRefresh();
          }
        } catch (e) {
          addToast('Błąd aktualizacji statusu', 'error');
        }
      };

      const DOC_TYPES = { invoice:'Faktura', cmr:'CMR', order:'Zlecenie', pod:'POD', sds:'SDS', certificate:'Certyfikat', transport_document:'Dok. transportowy', other:'Inny' };
      const STATUS_COLORS = { 'new':'badge-cyan', 'processed':'badge-green', 'archived':'badge-gray', 'error':'badge-red', 'no_attachment':'badge-orange' };

      const filtered = documents.filter(d => {
        if (filter !== 'all' && d.status !== filter) return false;
        if (typeFilter !== 'all' && d.doc_type !== typeFilter) return false;
        return true;
      });

      const statCounts = { total: documents.length, new: documents.filter(d => d.status === 'new').length, processed: documents.filter(d => d.status === 'processed').length };

      return (
        <div className="fade-in">
          <div style={{display:'flex',gap:16,marginBottom:20}}>
            <div className="stat-card" style={{flex:1,background:'rgba(6,182,212,.08)',borderColor:'rgba(6,182,212,.2)'}}>
              <div className="value" style={{color:'var(--accent-cyan)'}}>{statCounts.total}</div>
              <div className="label">Dokumentów</div>
            </div>
            <div className="stat-card" style={{flex:1,background:'rgba(6,182,212,.15)',borderColor:'rgba(6,182,212,.3)'}}>
              <div className="value" style={{color:'#22d3ee'}}>{statCounts.new}</div>
              <div className="label">Nowych</div>
            </div>
            <div className="stat-card" style={{flex:1,background:'rgba(34,197,94,.08)',borderColor:'rgba(34,197,94,.2)'}}>
              <div className="value" style={{color:'var(--accent-green)'}}>{statCounts.processed}</div>
              <div className="label">Przetworzonych</div>
            </div>
          </div>

          <div className="filter-bar">
            <select value={filter} onChange={e => setFilter(e.target.value)} style={{width:140}}>
              <option value="all">Wszystkie statusy</option>
              <option value="new">Nowe</option>
              <option value="processed">Przetworzone</option>
              <option value="archived">Zarchiwizowane</option>
            </select>
            <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{width:160}}>
              <option value="all">Wszystkie typy</option>
              {Object.entries(DOC_TYPES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            <button className="btn btn-ghost btn-sm" onClick={fetchDocuments}>{'\u{1F504}'} Odśwież</button>
          </div>

          {loading ? <div style={{textAlign:'center',padding:60}}><div className="spinner"/></div> :
           filtered.length === 0 ? (
            <div className="card" style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>{'\u{1F4C4}'}</div>
              <div style={{color:'var(--text-dim)',fontSize:14}}>Brak dokumentów{filter !== 'all' ? ' w tej kategorii' : ''}</div>
            </div>
           ) : (
            <div style={{overflowX:'auto'}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Nadawca</th>
                    <th>Typ</th>
                    <th>Nr ref.</th>
                    <th>Plik</th>
                    <th>Rozmiar</th>
                    <th>Status</th>
                    <th>Akcje</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((d, i) => (
                    <tr key={i}>
                      <td style={{fontSize:12,color:'var(--text-dim)',whiteSpace:'nowrap'}}>{d.timestamp || ''}</td>
                      <td>
                        <div style={{fontWeight:600,fontSize:13}}>{d.from_name || d.company || ''}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)'}}>{d.from_email || d.from || ''}</div>
                      </td>
                      <td><span className="badge badge-purple" style={{fontSize:10}}>{DOC_TYPES[d.doc_type] || d.doc_type || '?'}</span></td>
                      <td style={{fontFamily:'JetBrains Mono',fontSize:12}}>{d.reference || ''}</td>
                      <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {d.drive_link ? <a href={d.drive_link} target="_blank" style={{color:'var(--accent-blue)',textDecoration:'none',fontSize:12}}>{d.filename || 'Otwórz'}</a> : (d.filename || '-')}
                      </td>
                      <td style={{fontSize:12,color:'var(--text-dim)'}}>{d.file_size || ''}</td>
                      <td><span className={`badge ${STATUS_COLORS[d.status] || 'badge-gray'}`} style={{fontSize:10}}>{d.status}</span></td>
                      <td>
                        <div style={{display:'flex',gap:4}}>
                          {d.status === 'new' && <button className="btn btn-green btn-sm" style={{fontSize:10,padding:'3px 8px'}} onClick={() => updateStatus(d.id, 'processed')}>{'\u2705'}</button>}
                          {d.status !== 'archived' && <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'3px 8px'}} onClick={() => updateStatus(d.id, 'archived')}>{'\u{1F4E6}'}</button>}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
           )}
        </div>
      );
    }

    // ==================== TASKS PANEL ====================
    function TasksPanel({ addToast, onRefresh, currentUser }) {
      const [tasks, setTasks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');
      const [priorityFilter, setPriorityFilter] = useState('all');

      const fetchTasks = useCallback(async () => {
        setLoading(true);
        try {
          const res = await fetch(GAS_URL + '?action=getTasks&secret=' + API_SECRET);
          const data = await res.json();
          if (data.success) setTasks(data.tasks || []);
        } catch (e) {
          addToast('Błąd ładowania zadań', 'error');
        }
        setLoading(false);
      }, []);
      useEffect(() => { fetchTasks(); }, []);

      const updateStatus = async (taskId, status) => {
        try {
          const payload = encodeURIComponent(JSON.stringify({ taskId, status }));
          const res = await fetch(GAS_URL + '?action=updateTaskStatus&secret=' + API_SECRET + '&payload=' + payload);
          const data = await res.json();
          if (data.success) {
            addToast('Status zadania zmieniony', 'success');
            fetchTasks();
            onRefresh && onRefresh();
          }
        } catch (e) {
          addToast('Błąd aktualizacji statusu', 'error');
        }
      };

      const updateAssignee = async (taskId, assignee) => {
        try {
          const payload = encodeURIComponent(JSON.stringify({ taskId, assignee }));
          const res = await fetch(GAS_URL + '?action=updateTaskAssignee&secret=' + API_SECRET + '&payload=' + payload);
          const data = await res.json();
          if (data.success) {
            addToast('Przypisanie zmienione', 'success');
            fetchTasks();
          }
        } catch (e) {
          addToast('Błąd zmiany przypisania', 'error');
        }
      };

      const PRIORITY_ICONS = { high: '\u{1F534}', medium: '\u{1F7E1}', low: '\u{1F7E2}' };
      const PRIORITY_LABELS = { high: 'Pilne', medium: 'Normalne', low: 'Niskie' };
      const STATUS_LABELS = { 'new': 'Nowe', 'in_progress': 'W trakcie', 'done': 'Zakończone' };
      const STATUS_BADGE = { 'new': 'badge-cyan', 'in_progress': 'badge-orange', 'done': 'badge-green' };

      const filtered = tasks.filter(t => {
        if (filter !== 'all' && t.status !== filter) return false;
        if (priorityFilter !== 'all' && t.priority !== priorityFilter) return false;
        return true;
      });

      const statCounts = { total: tasks.length, new: tasks.filter(t => t.status === 'new').length, inProgress: tasks.filter(t => t.status === 'in_progress').length, done: tasks.filter(t => t.status === 'done').length };

      return (
        <div className="fade-in">
          <div style={{display:'flex',gap:16,marginBottom:20}}>
            <div className="stat-card" style={{flex:1,background:'rgba(245,158,11,.08)',borderColor:'rgba(245,158,11,.2)'}}>
              <div className="value" style={{color:'var(--accent-orange)'}}>{statCounts.total}</div>
              <div className="label">Zadań</div>
            </div>
            <div className="stat-card" style={{flex:1,background:'rgba(6,182,212,.15)',borderColor:'rgba(6,182,212,.3)'}}>
              <div className="value" style={{color:'var(--accent-cyan)'}}>{statCounts.new}</div>
              <div className="label">Nowych</div>
            </div>
            <div className="stat-card" style={{flex:1,background:'rgba(245,158,11,.15)',borderColor:'rgba(245,158,11,.3)'}}>
              <div className="value" style={{color:'var(--accent-orange)'}}>{statCounts.inProgress}</div>
              <div className="label">W trakcie</div>
            </div>
            <div className="stat-card" style={{flex:1,background:'rgba(34,197,94,.08)',borderColor:'rgba(34,197,94,.2)'}}>
              <div className="value" style={{color:'var(--accent-green)'}}>{statCounts.done}</div>
              <div className="label">Zakończone</div>
            </div>
          </div>

          <div className="filter-bar">
            <select value={filter} onChange={e => setFilter(e.target.value)} style={{width:140}}>
              <option value="all">Wszystkie statusy</option>
              <option value="new">Nowe</option>
              <option value="in_progress">W trakcie</option>
              <option value="done">Zakończone</option>
            </select>
            <select value={priorityFilter} onChange={e => setPriorityFilter(e.target.value)} style={{width:140}}>
              <option value="all">Wszystkie priorytety</option>
              <option value="high">{'\u{1F534}'} Pilne</option>
              <option value="medium">{'\u{1F7E1}'} Normalne</option>
              <option value="low">{'\u{1F7E2}'} Niskie</option>
            </select>
            <button className="btn btn-ghost btn-sm" onClick={fetchTasks}>{'\u{1F504}'} Odśwież</button>
          </div>

          {loading ? <div style={{textAlign:'center',padding:60}}><div className="spinner"/></div> :
           filtered.length === 0 ? (
            <div className="card" style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>{'\u{2705}'}</div>
              <div style={{color:'var(--text-dim)',fontSize:14}}>Brak zadań{filter !== 'all' ? ' w tej kategorii' : ''}</div>
            </div>
           ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {filtered.map((t, i) => (
                <div key={i} className="card" style={{
                  padding:'16px 20px', display:'flex', alignItems:'flex-start', gap:14,
                  borderLeft: t.priority === 'high' ? '3px solid var(--accent-red)' : t.priority === 'medium' ? '3px solid var(--accent-orange)' : '3px solid var(--accent-green)',
                  opacity: t.status === 'done' ? 0.55 : 1, transition: 'all .2s'
                }}>
                  <div style={{fontSize:22,flexShrink:0,marginTop:2}}>{PRIORITY_ICONS[t.priority] || '\u{1F7E1}'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:4}}>
                      <div style={{fontWeight:600,fontSize:14}}>{t.subject || t.action_required || 'Zadanie'}</div>
                      <div style={{fontSize:11,color:'var(--text-dim)',flexShrink:0}}>{t.created_at || ''}</div>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5,marginBottom:8}}>{t.ai_summary || t.action_required || ''}</div>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                      <span className={`badge ${STATUS_BADGE[t.status] || 'badge-gray'}`} style={{fontSize:10}}>{STATUS_LABELS[t.status] || t.status}</span>
                      <span className="badge badge-purple" style={{fontSize:10}}>{'\u{1F464}'} {t.assigned_to || '?'}</span>
                      <span style={{fontSize:11,color:'var(--text-dim)'}}>od: {t.from_name || t.from_email || '?'}</span>
                      {t.source_mailbox && t.source_mailbox !== 'office' && <span className="badge badge-blue" style={{fontSize:9}}>{t.source_mailbox}@</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
                    {t.status === 'new' && <button className="btn btn-primary btn-sm" style={{fontSize:10}} onClick={() => updateStatus(t.id, 'in_progress')}>{'\u{25B6}'} Start</button>}
                    {t.status === 'in_progress' && <button className="btn btn-green btn-sm" style={{fontSize:10}} onClick={() => updateStatus(t.id, 'done')}>{'\u{2705}'} Gotowe</button>}
                    {t.status !== 'new' && t.status !== 'in_progress' && <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={() => updateStatus(t.id, 'new')}>{'\u{21A9}'} Wróć</button>}
                    <select style={{padding:'3px 6px',fontSize:10,width:90}} value={t.assigned_to || ''} onChange={e => updateAssignee(t.id, e.target.value)}>
                      <option value="Marcin">Marcin</option>
                      <option value="Kuba">Kuba</option>
                      <option value="Ania">Ania</option>
                      <option value="Patryk">Patryk</option>
                    </select>
                  </div>
                </div>
              ))}
            </div>
           )}
        </div>
      );
    }

    // ==================== NOTIFICATIONS PANEL ====================
    function NotificationsPanel({ addToast, onRefresh }) {
      const [notifications, setNotifications] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all'); // all, pending, read

      const fetchNotifications = useCallback(async () => {
        setLoading(true);
        let q = sb.from('notifications').select('*').order('scheduled_at', { ascending: false }).limit(100);
        if (filter === 'pending') q = q.in('status', ['PENDING']);
        if (filter === 'read') q = q.in('status', ['READ','SENT']);
        const { data, error } = await q;
        if (error) addToast('Blad ladowania powiadomien: ' + error.message, 'error');
        setNotifications(data || []);
        setLoading(false);
      }, [filter]);

      useEffect(() => { fetchNotifications(); }, [filter]);

      const markAsRead = async (id) => {
        await sb.from('notifications').update({ status: 'READ', sent_at: new Date().toISOString() }).eq('id', id);
        fetchNotifications();
        onRefresh();
      };

      const markAllRead = async () => {
        await sb.from('notifications').update({ status: 'READ', sent_at: new Date().toISOString() }).eq('status', 'PENDING');
        addToast('Wszystkie powiadomienia oznaczone jako przeczytane', 'success');
        fetchNotifications();
        onRefresh();
      };

      const deleteNotification = async (id) => {
        await sb.from('notifications').delete().eq('id', id);
        fetchNotifications();
        onRefresh();
      };

      const generateScheduledNotifications = async () => {
        addToast('Sprawdzam zaplanowane powiadomienia...', 'info');
        const { data: orders } = await sb.from('orders').select('*').not('status', 'in', '(cancelled,paid)');
        let count = 0;
        const today = new Date();
        for (const order of (orders||[])) {
          // Check D-1 before loading
          if (order.loading_date) {
            const ld = new Date(order.loading_date);
            const diff = Math.ceil((ld - today) / 86400000);
            if (diff === 1 || diff === 0) {
              const { data: existing } = await sb.from('notifications').select('id')
                .eq('order_id', order.id).eq('notification_type', 'DAY_BEFORE_LOADING').eq('status', 'PENDING');
              if (!existing || existing.length === 0) {
                await sb.from('notifications').insert({
                  order_id: order.id, notification_type: 'DAY_BEFORE_LOADING', channel: 'dashboard',
                  scheduled_at: new Date().toISOString(),
                  title: `Jutro zaladunek: ${order.order_number}`,
                  message: `Zaladowanie ${order.order_number} zaplanowane na ${order.loading_date}. Trasa: ${order.loading_city} -> ${order.unloading_city}.`,
                  status: 'PENDING'
                });
                count++;
              }
            }
          }
        }
        addToast(count > 0 ? `Wygenerowano ${count} nowych powiadomien` : 'Brak nowych powiadomien do wygenerowania', count > 0 ? 'success' : 'info');
        fetchNotifications();
        onRefresh();
      };

      const formatDate = d => {
        if (!d) return '-';
        const dt = new Date(d);
        const now = new Date();
        const diffMs = now - dt;
        if (diffMs < 60000) return 'Przed chwila';
        if (diffMs < 3600000) return `${Math.floor(diffMs/60000)} min temu`;
        if (diffMs < 86400000) return `${Math.floor(diffMs/3600000)} godz temu`;
        if (diffMs < 0) {
          const futureDays = Math.ceil(-diffMs / 86400000);
          return `Za ${futureDays} dni`;
        }
        return dt.toLocaleDateString('pl-PL') + ' ' + dt.toLocaleTimeString('pl-PL', { hour:'2-digit', minute:'2-digit' });
      };

      const pending = notifications.filter(n => n.status === 'PENDING');

      return (
        <div className="fade-in">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h2 style={{fontSize:22,fontWeight:600}}>Powiadomienia</h2>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={generateScheduledNotifications} style={{fontSize:12}}>Sprawdz zaplanowane</button>
              {pending.length > 0 && <button className="btn btn-ghost" onClick={markAllRead} style={{fontSize:12}}>Oznacz wszystkie jako przeczytane</button>}
            </div>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:20}}>
            {[{v:'all',l:'Wszystkie'},{v:'pending',l:'Oczekujace'},{v:'read',l:'Przeczytane'}].map(f => (
              <button key={f.v} className={`btn ${filter===f.v?'btn-primary':'btn-ghost'}`} style={{fontSize:12,padding:'6px 14px'}} onClick={()=>setFilter(f.v)}>{f.l}</button>
            ))}
          </div>

          {loading ? <div style={{textAlign:'center',padding:60}}><div className="spinner"/></div> :
           notifications.length === 0 ? (
            <div className="card" style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{fontSize:48,marginBottom:12}}>{'\u{1F514}'}</div>
              <div style={{color:'var(--text-dim)',fontSize:14}}>Brak powiadomien</div>
            </div>
           ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {notifications.map(n => (
                <div key={n.id} className="card" style={{
                  padding:'14px 18px', display:'flex', alignItems:'flex-start', gap:14,
                  borderLeft: n.status==='PENDING' ? '3px solid var(--accent-orange)' : '3px solid transparent',
                  opacity: n.status==='PENDING' ? 1 : 0.65, transition: 'all .2s'
                }}>
                  <div style={{fontSize:22,flexShrink:0,marginTop:2}}>
                    {NOTIF_TYPE_ICONS[n.notification_type] || '\u{1F514}'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:4}}>
                      <div style={{fontWeight:600,fontSize:14}}>{n.title || NOTIF_TYPE_LABELS[n.notification_type] || n.notification_type}</div>
                      <div style={{fontSize:11,color:'var(--text-dim)',flexShrink:0}}>{formatDate(n.scheduled_at)}</div>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>{n.message}</div>
                    <div style={{display:'flex',gap:8,marginTop:8}}>
                      <span style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:n.status==='PENDING'?'rgba(245,158,11,.15)':'rgba(34,197,94,.1)',color:n.status==='PENDING'?'var(--accent-orange)':'var(--accent-green)',fontWeight:600}}>
                        {n.status}
                      </span>
                      <span style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'rgba(99,102,241,.1)',color:'var(--accent-blue)'}}>
                        {NOTIF_TYPE_LABELS[n.notification_type] || n.notification_type}
                      </span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    {n.status === 'PENDING' && (
                      <button className="btn-icon" onClick={()=>markAsRead(n.id)} title="Oznacz jako przeczytane" style={{fontSize:14}}>{'\u2705'}</button>
                    )}
                    <button className="btn-icon" onClick={()=>deleteNotification(n.id)} title="Usun" style={{fontSize:14,color:'var(--accent-red)'}}>{'\u2716'}</button>
                  </div>
                </div>
              ))}
            </div>
           )}
        </div>
      );
    }

    // ==================== RENDER ====================
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
